<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="flex min-h-screen flex-col bg-gray-50 text-gray-900">
    <!-- Shared nav bar -->
    <header class="border-b bg-white">
        <nav class="mx-auto max-w-6xl px-4 py-4" aria-label="Main navigation">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-xl font-bold">ShopLite</a>

                <div class="flex items-center gap-4">
                <!-- Cart link with live count badge (always visible) -->
                    <a href="cart.html" class="relative inline-flex items-center" aria-label="Cart">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <span class="cart-badge absolute -right-2 -top-2 hidden min-w-[1.25rem] rounded-full bg-blue-600 px-1 text-center text-xs font-bold leading-5 text-white">0</span>
                    </a>

                    <!-- Mobile menu toggle (hidden on md+ screens) -->
                    <button id="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu"
                        class="md:hidden" aria-label="Toggle navigation">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Collapsible menu: row on desktop, stacked + hidden by default on mobile -->
            <ul id="nav-menu" class="mt-4 hidden flex-col gap-4 text-sm md:mt-0 md:flex md:flex-row md:items-center md:gap-6">
                <li><a href="home.html" class="hover:text-blue-600">Home</a></li>
                <li><a href="cart.html" class="hover:text-blue-600">Cart</a></li>
                <li><a href="register.html" class="hover:text-blue-600">Register</a></li>
            </ul>
        </nav>
    </header>

    <main class="mx-auto w-full max-w-6xl flex-1 px-4 py-8">
        <!-- Banner -->
        <section class="mb-10 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-12 text-white sm:px-12">
            <h1 class="text-3xl font-bold sm:text-4xl">Welcome to ShopLite</h1>
            <p class="mt-3 max-w-xl text-blue-100">
                A demo store with API get from Fake Store API.
            </p>
        </section>

        <!-- Toolbar: search and filter -->
        <section aria-label="Product filters" class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center">
            <input id="search-input" type="search" placeholder="Search products..."
                class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:max-w-xs" />
            <select id="category-filter"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:w-auto">
                <option value="all">All categories</option>
            </select>
            <select id="sort-select"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:w-auto">
                <option value="default">Sort by</option>
                <option value="price-asc">Price: low to high</option>
                <option value="price-desc">Price: high to low</option>
                <option value="name-asc">Name: A to Z</option>
                <option value="name-desc">Name: Z to A</option>
            </select>
        </section>
        
        <!-- product grid -->
        <section aria-labelledby="products-heading">
            <h2 id="products-heading" class="sr-only">Products</h2>
            <div id="product-list" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>

            <!-- Load more button-->
            <div class="mt-8 text-center">
                <button id="load-more-btn" type="button"
                class="hidden rounded-lg border border-gray-300 bg-white px-6 py-2 font-medium hover:bg-gray-100">
                Load more
                </button>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/home.js"></script>
</body>
</html>
