<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="flex min-h-screen flex-col bg-gray-50 text-gray-900">
    <!-- Shared nav bar -->
    <header class="border-b bg-white">
        <nav class="mx-auto max-w-6xl px-4 py-4" aria-label="Main navigation">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-xl font-bold">ShopLite</a>

                <div class="flex items-center gap-4">
                <!-- Cart link with live count badge (always visible) -->
                    <a href="cart.html" class="relative inline-flex items-center" aria-label="Cart">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <span class="cart-badge absolute -right-2 -top-2 hidden min-w-[1.25rem] rounded-full bg-blue-600 px-1 text-center text-xs font-bold leading-5 text-white">0</span>
                    </a>

                    <!-- Mobile menu toggle (hidden on md+ screens) -->
                    <button id="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu"
                        class="md:hidden" aria-label="Toggle navigation">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Collapsible menu: row on desktop, stacked + hidden by default on mobile -->
            <ul id="nav-menu" class="mt-4 hidden flex-col gap-4 text-sm md:mt-0 md:flex md:flex-row md:items-center md:gap-6">
                <li><a href="home.html" class="hover:text-blue-600">Home</a></li>
                <li><a href="cart.html" class="hover:text-blue-600">Cart</a></li>
                <li><a href="register.html" class="hover:text-blue-600">Register</a></li>
            </ul>
        </nav>
    </header>

    <main class="mx-auto w-full max-w-md flex-1 px-4 py-8">
        <h1 class="mb-6 text-2xl font-bold">Create an account</h1>

        <form id="register-form" class="space-y-4" novalidate>
            <!-- Full name -->
            <div>
                <label for="name" class="mb-1 block text-sm font-medium">Full name</label>
                <input id="name" name="name" type="text" autocomplete="name"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
                <p class="mt-1 text-sm text-red-600" data-error="name"></p>
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="mb-1 block text-sm font-medium">Email</label>
                <input id="email" name="email" type="email" autocomplete="email"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
                <p class="mt-1 text-sm text-red-600" data-error="email"></p>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="mb-1 block text-sm font-medium">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
                <p class="mt-1 text-sm text-red-600" data-error="password"></p>
            </div>

            <!-- Phone -->
            <div>
                <label for="phone" class="mb-1 block text-sm font-medium">Phone number</label>
                <input id="phone" name="phone" type="tel" autocomplete="tel" inputmode="numeric"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
                <p class="mt-1 text-sm text-red-600" data-error="phone"></p>
            </div>

            <!-- Topic (select) -->
            <div>
                <label for="topic" class="mb-1 block text-sm font-medium">Contact topic</label>
                <select id="topic" name="topic"
                  class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
                    <option value="">-- Please choose --</option>
                    <option value="general">General question</option>
                    <option value="order">Order support</option>
                    <option value="partnership">Partnership</option>
                </select>
                <p class="mt-1 text-sm text-red-600" data-error="topic"></p>
            </div>

            <!-- Terms checkbox -->
            <div>
                <label class="flex items-start gap-2 text-sm">
                    <input id="terms" name="terms" type="checkbox" class="mt-0.5" />
                    <span>I agree to the terms and conditions.</span>
                </label>
                <p class="mt-1 text-sm text-red-600" data-error="terms"></p>
            </div>

            <button type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-3 font-medium text-white hover:bg-blue-700">
                Register
            </button>

            <!-- Success message (revealed by register.js on valid submit) -->
            <p id="form-success" class="hidden rounded-lg bg-green-50 p-3 text-center text-sm font-medium text-green-700"
                role="status">
                Registration successful! Welcome to ShopLite.
            </p>
        </form>
    </main>

    
    <footer class="border-t bg-white">
        <div class="mx-auto max-w-6xl px-4 py-6 text-sm text-gray-500">
            &copy; 2026 ShopLite
        </div>
    </footer>

    <script src="../js/register.js"></script>
</body>
</html>
